name: IndexNow ping

on:
  push:
    branches: [main]
    paths:
      - '**.html'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      HOST: lawsuit.center
      KEY: 51ab7ae9b671c843427b75e0764e8012
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect page URLs
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run = submit the full site (initial seed)
            FILES=$(git ls-files '*.html')
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE=$(git rev-parse "${{ github.sha }}~1")
            fi
            FILES=$(git diff --name-only --diff-filter=ACMR "$BEFORE" "${{ github.sha }}" -- '*.html')
          fi
          > urls.txt
          for f in $FILES; do
            case "$f" in 404.html|footer.html) continue ;; esac
            p="${f%.html}"
            if [ "$(basename "$p")" = "index" ]; then
              d=$(dirname "$p")
              if [ "$d" = "." ]; then p=""; else p="$d/"; fi
            fi
            echo "https://${HOST}/${p}" >> urls.txt
          done
          sort -u urls.txt -o urls.txt
          echo "URLs to submit: $(wc -l < urls.txt)"
          cat urls.txt

      - name: Submit to IndexNow
        run: |
          set -e
          if [ ! -s urls.txt ]; then
            echo "No page URLs changed - nothing to submit."
            exit 0
          fi
          jq -Rn --arg host "$HOST" --arg key "$KEY" \
            '{host:$host, key:$key, keyLocation:("https://"+$host+"/"+$key+".txt"), urlList:[inputs]}' \
            < urls.txt > payload.json
          # Give Netlify a moment to finish deploying main before engines fetch
          sleep 60
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data-binary @payload.json \
            -w "\nIndexNow HTTP %{http_code}\n"
