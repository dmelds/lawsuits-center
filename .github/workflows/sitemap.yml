name: Generate sitemap

on:
  push:
    branches: [main]
    paths-ignore:
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate sitemap
        run: python generate-sitemap.py

      - name: Commit sitemap if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet sitemap.xml; then
            git add sitemap.xml
            git commit -m "Auto-update sitemap.xml [skip ci]"
            git push
          else
            echo "No sitemap changes."
          fi
